<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParseVis Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard">
        <header>
            <h1>ParseVis <span>Dashboard</span></h1>
            <div class="controls">
                <div class="range-controls">
                    <div class="range-group">
                        <label>Start: <span id="start-label">00:00</span></label>
                        <input type="range" id="start-range" min="0" max="100" value="0">
                    </div>
                    <div class="range-group">
                        <label>End: <span id="end-label">End</span></label>
                        <input type="range" id="end-range" min="0" max="100" value="100">
                    </div>
                </div>
                <button id="refresh-btn">Refresh Data</button>
            </div>
        </header>

        <main>
            <div class="top-row">
                <div class="card stat-card">
                    <h3>Total Damage</h3>
                    <p id="total-damage">0</p>
                </div>
                <div class="card stat-card">
                    <h3>Total Healing</h3>
                    <p id="total-healing">0</p>
                </div>
                <div class="card stat-card">
                    <h3>WS Average</h3>
                    <p id="ws-average">0</p>
                </div>
            </div>

            <div class="section-container">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('offensive-tab', this)">Offensive &
                        Accuracy</button>
                    <button class="tab-btn" onclick="switchTab('defensive-tab', this)">Defensive & Healing</button>
                    <div class="filters" style="display: flex; gap: 1rem; margin-left: auto; align-items: center;">
                        <select id="player-filter" class="filter-select">
                            <option value="All">All Players</option>
                        </select>
                        <select id="event-filter" class="filter-select">
                            <option value="All">All Events</option>
                        </select>
                    </div>
                </div>

                <div id="offensive-tab" class="tab-content active">
                    <div class="chart-row split">
                        <div class="card main-chart">
                            <h2>Cumulative Damage Over Time</h2>
                            <div class="canvas-container">
                                <canvas id="dpsChart"></canvas>
                            </div>
                        </div>
                        <div class="card event-feed-card">
                            <h2>Event Feed</h2>
                            <div id="event-feed" class="event-feed-list"></div>
                        </div>
                    </div>

                    <div class="chart-row split">
                        <div class="card sub-chart">
                            <h2>Damage Breakdown</h2>
                            <div class="canvas-container">
                                <canvas id="breakdownChart"></canvas>
                            </div>
                        </div>
                        <div class="card sub-chart">
                            <h2>Accuracy %</h2>
                            <div class="canvas-container">
                                <canvas id="accuracyChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="defensive-tab" class="tab-content" style="display: none;">
                    <div class="chart-row split">
                        <div class="card sub-chart">
                            <h2>Damage Taken</h2>
                            <div class="canvas-container">
                                <canvas id="damageTakenChart"></canvas>
                            </div>
                        </div>
                        <div class="card sub-chart">
                            <h2>Healing per Player</h2>
                            <div class="canvas-container">
                                <canvas id="healingChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="chart-row split">
                        <div class="card sub-chart">
                            <h2>Evasion & Hits Taken</h2>
                            <div class="canvas-container">
                                <canvas id="evasionChart"></canvas>
                            </div>
                        </div>
                        <!-- Empty spacer for grid alignment -->
                        <div class="card sub-chart" style="opacity: 0; pointer-events: none;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- The data payload generated by the Lua Addon -->
    <script src="data.js"></script>
    <script src="app.js"></script>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tabId).style.display = 'block';
            btn.classList.add('active');
        }
    </script>
</body>

</html>
